<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Qord × Trails of Bheta — Architecture</title>
<style>
  :root {
    --paper:   #f4ebd9;
    --ink:     #1b1a17;
    --ink-soft:#3b3833;
    --deodar:  #2f4a3a;
    --deodar2: #4a6a55;
    --terra:   #b0512e;
    --terra2:  #d97a4f;
    --indigo:  #3a4d6b;
    --rule:    #c9b78f;
    --purple:  #5b3d7a;
    --blue:    #2563ab;
    --gold:    #a07820;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--paper);
    font-family: "JetBrains Mono", ui-monospace, monospace;
    color: var(--ink);
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    border-bottom: 1px solid var(--rule);
    background: #efe3c8;
    flex-shrink: 0;
  }
  header h1 {
    font-family: Georgia, serif;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: .03em;
  }
  header p { font-size: 10px; opacity: .6; margin-top: 2px; }
  .header-right { display: flex; align-items: center; gap: 10px; }

  /* Layer filter pills */
  .pills { display: flex; gap: 6px; }
  .pill {
    font-size: 9px; padding: 3px 9px; border-radius: 20px; border: 1px solid;
    cursor: pointer; text-transform: uppercase; letter-spacing: .1em;
    transition: all .15s;
  }
  .pill.active { color: #fff; }
  .pill[data-layer="all"]      { border-color: var(--ink-soft); }
  .pill[data-layer="all"].active { background: var(--ink-soft); }
  .pill[data-layer="frontend"] { border-color: var(--deodar); }
  .pill[data-layer="frontend"].active { background: var(--deodar); }
  .pill[data-layer="backend"]  { border-color: var(--indigo); }
  .pill[data-layer="backend"].active  { background: var(--indigo); }
  .pill[data-layer="data"]     { border-color: var(--purple); }
  .pill[data-layer="data"].active     { background: var(--purple); }
  .pill[data-layer="external"] { border-color: var(--terra); }
  .pill[data-layer="external"].active { background: var(--terra); }

  .btn-replay {
    font-size: 9px; padding: 3px 12px; border-radius: 20px;
    border: 1px solid var(--gold); color: var(--gold);
    cursor: pointer; text-transform: uppercase; letter-spacing: .1em;
    background: transparent; transition: all .15s;
  }
  .btn-replay:hover { background: var(--gold); color: #fff; }

  /* ── Main layout ── */
  .workspace { display: flex; flex: 1; overflow: hidden; }

  /* SVG canvas */
  #canvas {
    flex: 1;
    cursor: grab;
    overflow: hidden;
  }
  #canvas:active { cursor: grabbing; }

  /* ── Side panel ── */
  .panel {
    width: 280px;
    background: #efe3c8;
    border-left: 1px solid var(--rule);
    padding: 20px;
    overflow-y: auto;
    flex-shrink: 0;
    transition: transform .25s ease;
  }
  .panel.hidden { transform: translateX(100%); width: 0; padding: 0; border: none; overflow: hidden; }
  .panel-title {
    font-family: Georgia, serif; font-size: 17px; margin-bottom: 4px;
  }
  .panel-tag {
    font-size: 9px; text-transform: uppercase; letter-spacing: .15em;
    opacity: .55; margin-bottom: 14px;
  }
  .panel-section { margin-bottom: 14px; }
  .panel-section h4 {
    font-size: 9px; text-transform: uppercase; letter-spacing: .15em;
    opacity: .5; margin-bottom: 6px; border-bottom: 1px solid var(--rule); padding-bottom: 4px;
  }
  .panel-section p, .panel-section li {
    font-size: 11px; line-height: 1.6; opacity: .85;
  }
  .panel-section ul { padding-left: 14px; }
  .tag-chip {
    display: inline-block; font-size: 9px; padding: 2px 7px;
    border-radius: 3px; margin: 2px; border: 1px solid var(--rule);
    background: rgba(255,255,255,.4);
  }
  .close-panel {
    float: right; cursor: pointer; font-size: 14px; opacity: .4; line-height: 1;
  }
  .close-panel:hover { opacity: 1; }

  /* ── Legend ── */
  .legend {
    position: absolute; bottom: 14px; left: 14px;
    background: rgba(244,235,217,.92); border: 1px solid var(--rule);
    border-radius: 4px; padding: 8px 12px; font-size: 9px;
    text-transform: uppercase; letter-spacing: .1em;
    backdrop-filter: blur(4px);
  }
  .legend-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* Replay step banner */
  #step-banner {
    position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: var(--paper);
    font-size: 11px; padding: 6px 16px; border-radius: 20px;
    display: none; white-space: nowrap;
    pointer-events: none;
  }
</style>
</head>

const EDGES = [
  { from: 'guest',      to: 'trails',      label: 'visits website',                     style: 'solid',  color: '#6b7280', layer: 'frontend' },
  { from: 'trails',     to: 'qord_api',    label: 'GET /property/[token]',              style: 'solid',  color: '#2f4a3a', layer: 'frontend', step: 1 },
  { from: 'qord_api',   to: 'trails',      label: 'blocked_ranges + price',             style: 'dashed', color: '#2f4a3a', layer: 'frontend', step: 2 },
  { from: 'trails',     to: 'qord_api',    label: 'POST /bookings/create',              style: 'solid',  color: '#2f4a3a', layer: 'frontend', step: 3 },
  { from: 'qord_api',   to: 'supabase',    label: 'read availability + write booking',  style: 'solid',  color: '#5b3d7a', layer: 'data',     step: 4 },
  { from: 'qord_api',   to: 'razorpay',    label: 'create payment link',                style: 'solid',  color: '#b0512e', layer: 'external', step: 5 },
  { from: 'razorpay',   to: 'trails',      label: 'short_url returned',                 style: 'dashed', color: '#b0512e', layer: 'external', step: 6 },

  { from: 'owner',      to: 'qord_dash',   label: 'manages bookings & settings',        style: 'solid',  color: '#6b7280', layer: 'backend' },
  { from: 'qord_dash',  to: 'supabase',    label: 'full CRUD + realtime',               style: 'solid',  color: '#5b3d7a', layer: 'data' },
  { from: 'supabase',   to: 'qord_dash',   label: 'realtime updates',                   style: 'dashed', color: '#5b3d7a', layer: 'data' },
  { from: 'qord_ical',  to: 'otas',        label: 'export .ics feed (OTAs pull)',       style: 'solid',  color: '#b0512e', layer: 'external' },
  { from: 'otas',       to: 'qord_ical',   label: 'import .ics (cron fetches)',         style: 'dashed', color: '#b0512e', layer: 'external' },
  { from: 'cron',       to: 'qord_ical',   label: 'trigger sync every 15 min',          style: 'solid',  color: '#3a4d6b', layer: 'backend' },
  { from: 'qord_ical',  to: 'supabase',    label: 'upsert imported bookings',           style: 'solid',  color: '#5b3d7a', layer: 'data' },
  { from: 'qord_dash',  to: 'qord_ical',   label: 'configure iCal feeds',              style: 'solid',  color: '#3a4d6b', layer: 'backend' },

  { from: 'guest',      to: 'guest_portal',label: 'access code login',                  style: 'dashed', color: '#6b7280', layer: 'backend' },
];

// ─── SVG rendering ──────────────────────────────────────────────────────────

const svg = document.getElementById('canvas');
let W = svg.clientWidth, H = svg.clientHeight;
let panX = 0, panY = 0, scale = 1;
let activeLayer = 'all';
let dragging = false, dragStart = null, panStart = null;
let animFrames = [];

function resize() {
  W = svg.clientWidth;
  H = svg.clientHeight;
}
window.addEventListener('resize', () => { resize(); renderAll(); });
resize();

// Center the diagram
function centerOffset() {
  const xs = NODES.map(n => n.x), ys = NODES.map(n => n.y);
  const minX = Math.min(...xs) - 80, maxX = Math.max(...xs) + 160;
  const minY = Math.min(...ys) - 60, maxY = Math.max(...ys) + 80;
  const dW = maxX - minX, dH = maxY - minY;
  const s = Math.min((W * .9) / dW, (H * .9) / dH, 1);
  return {
    tx: (W - dW * s) / 2 - minX * s,
    ty: (H - dH * s) / 2 - minY * s,
    s,
  };
}

function ns(tag, attrs = {}) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
  return el;
}

function nodeOpacity(node) {
  return activeLayer === 'all' || node.layer === activeLayer ? 1 : 0.15;
}
function edgeOpacity(edge) {
  return activeLayer === 'all' || edge.layer === activeLayer ? 1 : 0.08;
}

function renderAll() {
  svg.innerHTML = '';
  const { tx, ty, s } = centerOffset();
  const t = `translate(${tx + panX},${ty + panY}) scale(${scale * s})`;

  // Defs: arrowheads + dot filter
  const defs = ns('defs');

  const colors = [...new Set(EDGES.map(e => e.color)), '#888'];
  colors.forEach(c => {
    const cid = c.replace('#', 'arr');
    const marker = ns('marker', { id: cid, markerWidth:'8', markerHeight:'8', refX:'6', refY:'3', orient:'auto' });
    const path = ns('path', { d:'M0,0 L0,6 L8,3 z', fill: c });
    marker.appendChild(path);
    defs.appendChild(marker);
  });

  // glow filter
  const filter = ns('filter', { id: 'glow' });
  const feBlur = ns('feGaussianBlur', { stdDeviation: '3', result: 'blur' });
  const feMerge = ns('feMerge');
  const fm1 = ns('feMergeNode', { in: 'blur' });
  const fm2 = ns('feMergeNode', { in: 'SourceGraphic' });
  feMerge.append(fm1, fm2);
  filter.append(feBlur, feMerge);
  defs.appendChild(filter);
  svg.appendChild(defs);

  const g = ns('g', { transform: t });
  svg.appendChild(g);

  // Draw edges
  EDGES.forEach((e, i) => {
    const from = NODES.find(n => n.id === e.from);
    const to   = NODES.find(n => n.id === e.to);
    if (!from || !to) return;

    const opacity = edgeOpacity(e);

    // slightly curved path
    const mx = (from.x + 80 + to.x + 80) / 2;
    const my = (from.y + 28 + to.y + 28) / 2 + (i % 3 - 1) * 20;

    const pathD = `M${from.x+80},${from.y+28} Q${mx},${my} ${to.x+80},${to.y+28}`;
    const cid = e.color.replace('#', 'arr');

    const path = ns('path', {
      d: pathD,
      stroke: e.color,
      'stroke-width': '1.5',
      fill: 'none',
      'stroke-dasharray': e.style === 'dashed' ? '6 4' : 'none',
      'marker-end': `url(#${cid})`,
      opacity,
      class: `edge edge-${e.from}-${e.to}`,
      'data-label': e.label,
      'data-from': e.from,
      'data-to': e.to,
      style: 'cursor:pointer',
    });

    // invisible fat hit area
    const hit = ns('path', {
      d: pathD, stroke: 'transparent', 'stroke-width': '12', fill: 'none', style: 'cursor:pointer',
    });

    const tooltip = ns('g', { class: 'edge-tooltip', opacity: 0, 'pointer-events': 'none' });
    const pathLen = 60;
    const rx = (from.x + 80 + to.x + 80) / 2 - 60;
    const ry = my - 14;
    const tb = ns('rect', { x: rx, y: ry, width: 120, height: 18, rx: 3, fill: '#1b1a17', opacity: '.85' });
    const tt = ns('text', { x: rx + 60, y: ry + 12, 'text-anchor': 'middle', fill: '#f4ebd9', 'font-size': '8', 'font-family': 'monospace' });
    tt.textContent = e.label;
    tooltip.append(tb, tt);

    [path, hit].forEach(el => {
      el.addEventListener('mouseenter', () => { tooltip.setAttribute('opacity', 1); path.setAttribute('stroke-width', '2.5'); });
      el.addEventListener('mouseleave', () => { tooltip.setAttribute('opacity', 0); path.setAttribute('stroke-width', '1.5'); });
    });

    g.append(path, hit, tooltip);
  });

  // Draw nodes
  NODES.forEach(node => {
    const opacity = nodeOpacity(node);
    const ng = ns('g', { class: `node node-${node.id}`, style: 'cursor:pointer', opacity });

    // Shadow
    const shadow = ns('rect', { x: node.x+3, y: node.y+5, width: 160, height: 56, rx: 6, fill: 'rgba(0,0,0,.08)' });
    // Box
    const box = ns('rect', {
      x: node.x, y: node.y, width: 160, height: 56, rx: 6,
      fill: '#f4ebd9', stroke: node.color, 'stroke-width': '2',
    });
    // Colour bar
    const bar = ns('rect', { x: node.x, y: node.y, width: 6, height: 56, rx: '6 0 0 6', fill: node.color });
    const bar2 = ns('rect', { x: node.x, y: node.y, width: 6, height: 56, fill: node.color });

    // Icon
    const icon = ns('text', { x: node.x + 18, y: node.y + 24, 'font-size': '14', 'dominant-baseline': 'middle' });
    icon.textContent = node.icon;

    // Label
    const label = ns('text', {
      x: node.x + 34, y: node.y + 19, 'font-size': '10', 'font-weight': '700',
      fill: '#1b1a17', 'font-family': 'Georgia, serif',
    });
    label.textContent = node.label;

    // Sublabel
    const sub = ns('text', {
      x: node.x + 34, y: node.y + 33, 'font-size': '8', fill: '#6b7280', 'font-family': 'monospace',
    });
    sub.textContent = node.sublabel;

    ng.append(shadow, box, bar, bar2, icon, label, sub);

    ng.addEventListener('mouseenter', () => box.setAttribute('filter', 'url(#glow)'));
    ng.addEventListener('mouseleave', () => box.removeAttribute('filter'));
    ng.addEventListener('click', () => showPanel(node));

    g.appendChild(ng);
  });

  // Animate flow dots
  animFrames.forEach(cancelAnimationFrame);
  animFrames = [];
  animateFlowDots(g);
}

// ─── Flow dot animation ──────────────────────────────────────────────────────

function animateFlowDots(g) {
  EDGES.forEach((e, i) => {
    const from = NODES.find(n => n.id === e.from);
    const to   = NODES.find(n => n.id === e.to);
    if (!from || !to) return;

    const dot = ns('circle', { r: '3', fill: e.color, opacity: edgeOpacity(e) * 0.7 });
    g.appendChild(dot);

    const mx = (from.x + 80 + to.x + 80) / 2;
    const my = (from.y + 28 + to.y + 28) / 2 + (i % 3 - 1) * 20;

    let t = Math.random();
    const speed = 0.0008 + Math.random() * 0.0006;

    function step(ts) {
      t += speed;
      if (t > 1) t = 0;
      // Quadratic bezier position
      const x = (1-t)*(1-t)*(from.x+80) + 2*(1-t)*t*mx + t*t*(to.x+80);
      const y = (1-t)*(1-t)*(from.y+28) + 2*(1-t)*t*my + t*t*(to.y+28);
      dot.setAttribute('cx', x);
      dot.setAttribute('cy', y);
      dot.setAttribute('opacity', edgeOpacity(e) * 0.75);
      animFrames.push(requestAnimationFrame(step));
    }
    animFrames.push(requestAnimationFrame(step));
  });
}

// ─── Panel ──────────────────────────────────────────────────────────────────

function showPanel(node) {
  const panel = document.getElementById('panel');
  const d = node.detail;
  document.getElementById('panelTitle').textContent = node.label;
  document.getElementById('panelTag').textContent = d.tag;

  let html = '';

  if (d.about) {
    html += `<div class="panel-section"><h4>About</h4><p>${d.about}</p></div>`;
  }
  if (d.tech?.length) {
    html += `<div class="panel-section"><h4>Stack</h4>`;
    d.tech.forEach(t => html += `<span class="tag-chip">${t}</span>`);
    html += `</div>`;
  }
  if (d.endpoints?.length) {
    html += `<div class="panel-section"><h4>API Endpoints</h4><ul>`;
    d.endpoints.forEach(ep => html += `<li>${ep}</li>`);
    html += `</ul></div>`;
  }
  d.extra?.forEach(([title, items]) => {
    html += `<div class="panel-section"><h4>${title}</h4><ul>`;
    items.forEach(item => html += `<li>${item}</li>`);
    html += `</ul></div>`;
  });

  document.getElementById('panelBody').innerHTML = html;
  panel.classList.remove('hidden');
}

document.getElementById('closePanel').addEventListener('click', () => {
  document.getElementById('panel').classList.add('hidden');
});

// ─── Layer filter pills ──────────────────────────────────────────────────────

document.querySelectorAll('.pill').forEach(p => {
  p.addEventListener('click', () => {
    document.querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    activeLayer = p.dataset.layer;
    renderAll();
  });
});

// ─── Pan + zoom ──────────────────────────────────────────────────────────────

svg.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  dragging = true;
  dragStart = { x: e.clientX, y: e.clientY };
  panStart = { x: panX, y: panY };
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  panX = panStart.x + e.clientX - dragStart.x;
  panY = panStart.y + e.clientY - dragStart.y;
  renderAll();
});
window.addEventListener('mouseup', () => { dragging = false; });

svg.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  scale = Math.max(0.4, Math.min(2.5, scale * delta));
  renderAll();
}, { passive: false });

// ─── Booking flow replay ─────────────────────────────────────────────────────

const STEPS = [
  { edge: { from:'guest',    to:'trails'    }, msg: '1 · Guest opens TrailsOfBheta.in' },
  { edge: { from:'trails',   to:'qord_api'  }, msg: '2 · Website fetches availability from Qord' },
  { edge: { from:'qord_api', to:'trails'    }, msg: '3 · Qord returns blocked dates + pricing' },
  { edge: { from:'trails',   to:'qord_api'  }, msg: '4 · Guest submits booking request' },
  { edge: { from:'qord_api', to:'supabase'  }, msg: '5 · Qord checks availability → writes booking to Supabase' },
  { edge: { from:'qord_api', to:'razorpay'  }, msg: '6 · Qord creates Razorpay payment link (50% advance)' },
  { edge: { from:'razorpay', to:'trails'    }, msg: '7 · Payment link returned to guest' },
  { edge: { from:'guest',    to:'razorpay'  }, msg: '8 · Guest pays via UPI / card' },
  { edge: { from:'razorpay', to:'qord_api'  }, msg: '9 · Razorpay webhook: payment confirmed' },
  { edge: { from:'qord_api', to:'supabase'  }, msg: '10 · Booking marked paid in Supabase' },
];

let replayActive = false;
document.getElementById('replayBtn').addEventListener('click', async () => {
  if (replayActive) return;
  replayActive = true;
  const banner = document.getElementById('step-banner');
  banner.style.display = 'block';

  for (const step of STEPS) {
    banner.textContent = step.msg;
    activeLayer = 'all';
    renderAll();

    // Highlight the relevant edge
    const edges = svg.querySelectorAll('.edge');
    edges.forEach(el => {
      if (el.getAttribute('data-from') === step.edge.from && el.getAttribute('data-to') === step.edge.to) {
        el.setAttribute('stroke-width', '4');
        el.setAttribute('filter', 'url(#glow)');
      } else {
        el.setAttribute('opacity', '0.08');
      }
    });
    await new Promise(r => setTimeout(r, 1800));
  }

  banner.style.display = 'none';
  replayActive = false;
  renderAll();
});

// ─── Boot ────────────────────────────────────────────────────────────────────
renderAll();
</script>
